<!DOCTYPE html>
<html lang="my">
<head>
<link rel="icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Low-Stress Relaxing Reflex & Logic Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;font-family:sans-serif;color:#fff;overflow-x:hidden}
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:#0a0a0a;transition:background 0.4s ease}

/* ===== UNIFIED DASHBOARD ===== */
.dashboard{
  width:100%;max-width:420px;
  background:linear-gradient(160deg,#141a14 0%,#0d160d 100%);
  border:1px solid #22c55e28;border-radius:18px;
  box-shadow:0 4px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(34,197,94,0.07);
  overflow:hidden;margin-bottom:20px;
}

/* Top strip: level + lang */
.dash-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;
  border-bottom:1px solid rgba(34,197,94,0.08);
}
.q-lvl{
  font-size:11px;font-weight:700;letter-spacing:.07em;
  padding:4px 12px;border-radius:20px;
  background:rgba(34,197,94,0.08);border:1px solid #22c55e22;
  text-align:center;transition:all 0.3s ease;
}
.lvl-easy{color:#22c55e;border-color:rgba(34,197,94,0.35);box-shadow:0 0 8px rgba(34,197,94,0.12);}
.lvl-medium{color:#eab308;border-color:rgba(234,179,8,0.35);box-shadow:0 0 8px rgba(234,179,8,0.12);background:rgba(234,179,8,0.08);}
.lvl-hard{color:#ef4444;border-color:rgba(239,68,68,0.35);box-shadow:0 0 8px rgba(239,68,68,0.12);background:rgba(239,68,68,0.08);}
.lang-btn{
  font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;
  border:1px solid #38bdf844;background:#0f1e2a;color:#38bdf8;cursor:pointer;
  letter-spacing:.06em;transition:background .15s, box-shadow .15s;white-space:nowrap;
}
.lang-btn:hover{background:#162d3f;box-shadow:0 0 8px rgba(56,189,248,0.2);}

/* Main stats row */
.dash-stats{
  display:flex;justify-content:space-around;align-items:center;
  padding:14px 8px 10px;
}
.score-item{text-align:center;flex:1;position:relative;}
.score-item:not(:last-child)::after{
  content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);
  height:24px;width:1px;background:rgba(34,197,94,0.12);
}
.score-val{
  font-size:19px;font-weight:800;color:#22c55e;
  font-variant-numeric:tabular-nums;letter-spacing:-0.01em;
  transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),color 0.2s;
  display:block;
}
.score-val.pop{transform:scale(1.4);color:#4ade80}
.score-lbl{font-size:8.5px;color:#3d5c3d;text-transform:uppercase;letter-spacing:.07em;margin-top:4px;font-weight:600}

/* Bottom strip: lives + round */
.dash-bottom{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px 10px;
  border-top:1px solid rgba(34,197,94,0.08);
}
.lives-row{display:flex;align-items:center;gap:8px;}
.lives-val{font-size:20px;letter-spacing:2px;transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1);}
.lives-val.pop{transform:scale(1.25);}
.lives-lbl{font-size:9px;color:#3d5c3d;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
.round-pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.15);
  border-radius:20px;padding:4px 12px;
}
.round-num{font-size:16px;font-weight:800;color:#22c55e;font-variant-numeric:tabular-nums;}
.round-lbl{font-size:9px;color:#3d5c3d;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}

.ring-wrap{position:relative;width:380px;height:380px;margin-bottom:25px;transition:transform 0.1s}
canvas#ring{position:absolute;top:0;left:0}

@media (max-width: 420px) {
  .wrap{padding:12px 8px}
  .dashboard{border-radius:14px;margin-bottom:14px;}
  .score-val{font-size:14px;}
  .score-lbl{font-size:7.5px;}
  .lives-val{font-size:16px;letter-spacing:1px;}
  .ring-wrap{width:310px;height:310px;margin-bottom:18px}
  canvas#ring{width:310px;height:310px}
  .center-btn{width:222px;height:222px;padding:12px}
  .q-text{font-size:15px;max-width:190px;min-height:100px}
  .q-text.start-mode{font-size:20px}
  .q-text.gameover-title{font-size:16px}
  .q-text.gameover-desc{font-size:11px;margin-top:6px}
  .hint-text{font-size:12px;max-width:280px;margin-bottom:10px;}
  .ctrl-btn{padding:7px 12px;font-size:11px}
}

.center-btn{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:272px;height:272px;border-radius:50%;
  background:#1a2a1a;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:18px;text-align:center;
  transition:background .15s, transform .1s, opacity 0.2s;
  box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
  overflow: hidden;
}
.center-btn:active{transform:translate(-50%,-50%) scale(0.94)}
.center-btn.gameover-mode { background: #291313; cursor: default; }
.center-btn.gameover-mode:active { transform: translate(-50%,-50%) scale(1); }

.q-text{
  font-size:17px;font-weight:600;color:#e8ffe8;
  line-height:1.5;width:100%;max-width:224px;
  word-break:break-word;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:120px;
}
.q-text.status-mode { font-size: 58px; color: #fff; font-weight: 900; min-height:auto; }
.q-text.start-mode { font-size: 26px; color: #22c55e; font-weight: 800; text-shadow: 0 0 10px #22c55e66; min-height:auto; }
.q-text.gameover-title { font-size: 20px; color: #f87171; font-weight: 800; min-height:auto; line-height:1.3; }
.q-text.gameover-desc { font-size: 12px; color: #cbd5e1; margin-top: 8px; min-height:auto; line-height:1.6; }

.large-emoji {
  font-size: 64px;
  margin-top: 4px;
  line-height: 1;
  animation: emojiPop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

@keyframes emojiPop {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.btn-row{display:flex;gap:10px}
.ctrl-btn{
  padding:8px 18px;border-radius:8px;border:1px solid #22c55e44;
  background:#141a14;color:#22c55e;font-size:12px;cursor:pointer;
  transition:background .15s;
}
.ctrl-btn:hover{background:#1f3d1f}
.hint-text{
  font-size:13px;color:#38bdf8;margin-bottom:14px;text-align:center;
  max-width:340px;min-height:22px;font-weight:bold;line-height:1.4;
  transition:opacity 0.25s ease, transform 0.25s ease;
}
.hint-text.fade-out{opacity:0;transform:translateY(-4px)}
.hint-text.positive { color: #4ade80; }
.hint-text.negative { color: #f87171; }

/* Round transition overlay */
.round-flash{
  position:fixed;inset:0;pointer-events:none;
  background:rgba(34,197,94,0.06);
  opacity:0;z-index:99;
  transition:opacity 0.15s ease;
  border-radius:0;
}
.round-flash.active{opacity:1}

/* Jumpscare flash effect background */
.jumpscare-flash {
  background: #ff0000 !important;
}

/* Center button smooth state transitions */
.center-btn{
  transition:background .25s ease, transform .12s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease, box-shadow 0.3s ease !important;
}
.center-btn.answer-correct{
  box-shadow:0 0 40px rgba(34,197,94,0.35), 0 0 80px rgba(34,197,94,0.1) !important;
}
.center-btn.answer-wrong{
  box-shadow:0 0 40px rgba(239,68,68,0.35), 0 0 80px rgba(239,68,68,0.1) !important;
}

@keyframes slideInDown {
  from{transform:translateY(-8px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.q-text:not(.status-mode):not(.start-mode):not(.gameover-title):not(.gameover-desc){
  animation:slideInDown 0.22s cubic-bezier(0.22,1,0.36,1) both;
}

@media (prefers-reduced-motion: reduce) {
  .score-val, .hint-text, .q-text, .round-flash { transition: none !important; animation: none !important; }
}
@keyframes shake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  100% { transform: translate(-1px, -2px) rotate(-1deg); }
}

/* Lang confirm modal */
.lang-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity 0.2s ease;
  backdrop-filter:blur(4px);
}
.lang-modal-overlay.open{opacity:1;pointer-events:all;}
.lang-modal{
  background:linear-gradient(160deg,#141a14,#0d160d);
  border:1px solid #22c55e33;border-radius:20px;
  padding:28px 28px 22px;max-width:300px;width:90%;
  text-align:center;
  transform:scale(0.9) translateY(8px);
  transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 8px 40px rgba(0,0,0,0.6);
}
.lang-modal-overlay.open .lang-modal{transform:scale(1) translateY(0);}
.lang-modal-icon{font-size:32px;margin-bottom:10px;}
.lang-modal-title{font-size:15px;font-weight:700;color:#e8ffe8;margin-bottom:6px;}
.lang-modal-desc{font-size:12px;color:#6a8f6a;line-height:1.6;margin-bottom:20px;}
.lang-modal-btns{display:flex;gap:10px;justify-content:center;}
.lang-modal-btn{
  flex:1;padding:9px 0;border-radius:10px;border:none;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:background 0.15s, transform 0.1s;
}
.lang-modal-btn:active{transform:scale(0.96);}
.lang-modal-btn.confirm{background:#22c55e;color:#0a1a0a;}
.lang-modal-btn.confirm:hover{background:#4ade80;}
.lang-modal-btn.cancel{background:#1f2f1f;color:#6a9f6a;border:1px solid #22c55e22;}
.lang-modal-btn.cancel:hover{background:#283828;}
/* Corner indicator stars */
.corner-dot {
  position:fixed; width:44px; height:44px;
  display:flex; align-items:center; justify-content:center;
  font-size:26px; line-height:1;
  transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s, filter 0.2s;
  opacity: 0.45; z-index: 50; pointer-events: none;
}
.corner-dot.hit { opacity: 1; transform: scale(1.4); filter: drop-shadow(0 0 10px #22c55e); }
#cdot-tl { top:8px; left:8px; }
#cdot-tr { top:8px; right:8px; }
#cdot-bl { bottom:8px; left:8px; }
#cdot-br { bottom:8px; right:8px; }
</style>
</head>
<body>

<div class="round-flash" id="round-flash"></div>
<div id="cdot-tl" class="corner-dot" style="display:none;">⭐</div>
<div id="cdot-tr" class="corner-dot" style="display:none;">⭐</div>
<div id="cdot-bl" class="corner-dot" style="display:none;">⭐</div>
<div id="cdot-br" class="corner-dot" style="display:none;">⭐</div>
<div class="wrap" id="main-wrap">
  <!-- Unified Dashboard: Level + Lang + Stats + Lives -->
  <div class="dashboard" id="dashboard">
    <div class="dash-top">
      <div class="q-lvl lvl-easy" id="q-lvl" style="visibility:hidden;">အဆင့်: လွယ် (1/15)</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="help-btn" onclick="showHelp()" class="lang-btn" style="padding:4px 10px;font-size:14px;" aria-label="Instructions">❓</button>
        <button id="lang-btn" onclick="toggleLang()" class="lang-btn">🌐 English</button>
      </div>
    </div>
    <div class="dash-stats">
      <div class="score-item">
        <div class="score-val" id="sv-score">0</div>
        <div class="score-lbl" data-my="ရမှတ်" data-en="Score">ရမှတ်</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="sv-combo">0</div>
        <div class="score-lbl">Combo</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="sv-max-combo">0</div>
        <div class="score-lbl" data-my="Max Combo" data-en="Max Combo">Max Combo</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="sv-accuracy">100%</div>
        <div class="score-lbl">Accuracy</div>
      </div>
      <div class="score-item">
        <div class="score-val" id="sv-time">15</div>
        <div class="score-lbl" data-my="စက္ကန့်" data-en="Sec">စက္ကန့်</div>
      </div>
    </div>
    <div class="dash-bottom">
      <div class="lives-row">
        <span class="lives-val" id="sv-lives">❤️❤️❤️</span>
        <span class="lives-lbl" data-my="အသက်" data-en="Lives">အသက်</span>
      </div>
      <div class="round-pill">
        <span class="round-num" id="sv-round">1</span>
        <span class="round-lbl" data-my="အဆင့်" data-en="Round">အဆင့်</span>
      </div>
    </div>
  </div>

  <div class="hint-text" id="hint-txt">မိတ်ဆွေရဲ့ ဉာဏ်ရည်နဲ့ အာရုံစိုက်မှုကို စမ်းသပ်ကြည့်ရအောင်!</div>

  <div class="ring-wrap" id="ring-container">
    <canvas id="ring" width="320" height="320"></canvas>
    <button class="center-btn" id="main-btn" aria-label="ဂိမ်းခလုတ်">
      <div class="q-text start-mode" id="q-text">စတင်ရန်</div>
    </button>
  </div>

  <div class="btn-row">
    <button class="ctrl-btn" id="btn-start" data-my="စတင်ရန်" data-en="Start">စတင်ရန်</button>
    <button class="ctrl-btn" id="btn-next" data-my="ကျော်မည်" data-en="Skip">ကျော်မည်</button>
    <button class="ctrl-btn" id="btn-reset" data-my="ပြန်စရန်" data-en="Reset">ပြန်စရန်</button>
  </div>

  <!-- Share button (only shown on gameover) -->
  <button id="btn-share" onclick="shareScore()" style="display:none;margin-top:12px;padding:10px 28px;border-radius:12px;border:1px solid #38bdf844;background:linear-gradient(135deg,#0f1e2a,#162d3f);color:#38bdf8;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:background .15s,box-shadow .15s;" onmouseover="this.style.boxShadow='0 0 16px rgba(56,189,248,0.3)'" onmouseout="this.style.boxShadow=''">
    📤 <span id="share-btn-txt">Share Score</span>
  </button>
</div>

<div class="lang-modal-overlay" id="lang-modal-overlay">
  <div class="lang-modal">
    <div class="lang-modal-icon">🌐</div>
    <div class="lang-modal-title" id="lang-modal-title">Language ချိန်းမည်</div>
    <div class="lang-modal-desc" id="lang-modal-desc">ဂိမ်းရပ်ပြီး အစကနေ ပြန်စမည်။ ဆက်လုပ်မည်လား?</div>
    <div class="lang-modal-btns">
      <button class="lang-modal-btn cancel" id="lang-modal-cancel">မလုပ်တော့ပါ</button>
      <button class="lang-modal-btn confirm" id="lang-modal-confirm">ချိန်းမည်</button>
    </div>
  </div>
</div>

<!-- ═══ INSTRUCTIONS MODAL ═══ -->
<div class="lang-modal-overlay" id="help-modal-overlay" onclick="closeHelp()">
  <div class="lang-modal" style="max-width:320px;" onclick="event.stopPropagation()">
    <div style="text-align:center;font-size:28px;margin-bottom:8px;">🧠</div>
    <div id="help-title" style="font-size:15px;font-weight:800;color:#e8ffe8;text-align:center;margin-bottom:14px;">ဘယ်လိုကစားရမလဲ?</div>
    <div id="help-body" style="font-size:13px;color:#94a3b8;line-height:2;"></div>
    <button onclick="closeHelp()" style="width:100%;margin-top:14px;padding:9px;border-radius:10px;border:none;background:#22c55e;color:#0a1a0a;font-size:13px;font-weight:700;cursor:pointer;">
      OK, နားလည်ပြီ!
    </button>
  </div>
</div>

<!-- ═══ SHARE MODAL ═══ -->
<div class="lang-modal-overlay" id="share-modal-overlay" onclick="closeShare()">
  <div class="lang-modal" style="max-width:320px;" onclick="event.stopPropagation()">
    <div style="text-align:center;font-size:28px;margin-bottom:6px;">📤</div>
    <div id="share-modal-title" style="font-size:15px;font-weight:800;color:#e8ffe8;text-align:center;margin-bottom:4px;">Score Share လုပ်ပါ</div>
    <div id="share-preview" style="margin:12px 0;padding:12px;background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.2);border-radius:12px;font-size:12px;color:#94a3b8;line-height:1.8;text-align:center;"></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button onclick="doShare('native')" id="share-native-btn" style="padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#1e3a5f,#1e4080);color:#38bdf8;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
        📱 <span id="share-native-txt">Share via Apps</span>
      </button>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button onclick="doShare('telegram')" title="Telegram" style="flex:1;padding:10px 0;border-radius:12px;border:none;background:#1a2744;cursor:pointer;display:flex;align-items:center;justify-content:center;">
          <img src="img/icons8-telegram-app-48.png" alt="Telegram" style="width:28px;height:28px;object-fit:contain;">
        </button>
        <button onclick="doShare('facebook')" title="Facebook" style="flex:1;padding:10px 0;border-radius:12px;border:none;background:#1a2040;cursor:pointer;display:flex;align-items:center;justify-content:center;">
          <img src="img/icons8-facebook-48.png" alt="Facebook" style="width:28px;height:28px;object-fit:contain;">
        </button>
        <button onclick="doShare('instagram')" title="Instagram" style="flex:1;padding:10px 0;border-radius:12px;border:none;background:#2a1a2a;cursor:pointer;display:flex;align-items:center;justify-content:center;">
          <img src="img/icons8-instagram-48.png" alt="Instagram" style="width:28px;height:28px;object-fit:contain;">
        </button>
        <button onclick="doShare('copy')" title="Copy Link" style="flex:1;padding:10px 0;border-radius:12px;border:none;background:#1a1a2a;cursor:pointer;display:flex;align-items:center;justify-content:center;">
          <img src="img/icons8-copy.gif" alt="Copy" style="width:28px;height:28px;object-fit:contain;">
        </button>
      </div>
      <div id="share-copied-msg" style="text-align:center;font-size:11px;color:#4ade80;min-height:16px;"></div>
    </div>
    <button onclick="closeShare()" style="width:100%;margin-top:10px;padding:8px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#64748b;font-size:12px;cursor:pointer;">
      ပိတ်မည်
    </button>
  </div>
</div>

<script>
let currentLang = 'my'; 

const LANG = {
  my: {
    levelLabel: (lvl, idx) => `Lvl: ${lvl} (${idx}/15)`,
    startBtn: 'စတင်ရန်', skipBtn: 'ကျော်မည်', resetBtn: 'ပြန်စရန်',
    startText: 'စတင်ရန်',
    startingText: 'စတင်နေပါပြီး...',
    hintStart: '',
    hintReset: '',
    correctMsgs: [
      'ဖြေတာ တိကျတယ်! 🎯',
      'တုံ့ပြန်မှု ကောင်းတယ်! ⚡',
      'ကောင်းတယ်! 👏',
      'အရှိန်ကောင်းနေတယ်! 🔥',
      'ဆက်တိုက်မှန်နေတယ်! ✨',
      'ဒီအရှိန်ကို ဆက်ထိန်းထား! 💪',
    ],
    wrongMsgs: [
      'ဟိုင်း... လွဲသွားတယ်! 😅',
      'ဒီတစ်ခေါက် မမှန်သေးဘူး! 🎲',
      'နောက်တစ်ခေါက် ထပ်ကြိုးစားကြည့်! 🔄',
    ],
    timeoutMsgs: [
      'အချိန်မမီလိုက်ဘူး! ⏳',
      'နှေးသွားတယ်! ⏰',
      'အမြန်နှိပ်ပါ နောက်ကြိမ်! ⚡',

function toggleLang() {
  if (gs && (gs.phase === 'playing' || gs.phase === 'result')) {
    showLangModal();
    return;
  }
  doSwitchLang();
}

function showLangModal() {
  const nextLang = currentLang === 'my' ? 'en' : 'my';
  const isMy = currentLang === 'my';
  document.getElementById('lang-modal-title').textContent = isMy ? 'Switch to English?' : 'မြန်မာသို့ ပြောင်းမည်';
  document.getElementById('lang-modal-desc').textContent = isMy ? 'Game will stop and restart from the beginning.' : 'ဂိမ်းရပ်ပြီး အစကနေ ပြန်စမည်။';
  document.getElementById('lang-modal-cancel').textContent = isMy ? 'Cancel' : 'မလုပ်တော့ပါ';
  document.getElementById('lang-modal-confirm').textContent = isMy ? 'Switch' : 'ချိန်းမည်';
  document.getElementById('lang-modal-overlay').classList.add('open');
}

function closeLangModal() {
  document.getElementById('lang-modal-overlay').classList.remove('open');
}

function doSwitchLang() {
  currentLang = currentLang === 'my' ? 'en' : 'my';
  document.getElementById('lang-btn').textContent = currentLang === 'my' ? '🌐 English' : '🌐 မြန်မာ';
  applyLang();
}

document.getElementById('lang-modal-cancel').addEventListener('click', closeLangModal);
document.getElementById('lang-modal-confirm').addEventListener('click', () => {
  closeLangModal();
  if (gs.interval) clearInterval(gs.interval);
  if (gs.delayTimeout) clearTimeout(gs.delayTimeout);
  doSwitchLang();
  gs.score = 0; gs.combo = 0; gs.maxCombo = 0; gs.lives = 3;
  gs.correctAttempts = 0; gs.totalAttempts = 0;
  gs.round = 1; gs.phase = 'idle';
  document.getElementById('main-wrap').style.background = '#0a0a0a';
  const btn = document.getElementById('main-btn');
  btn.className = "center-btn";
  btn.style.opacity = '1';
  const lvlEl = document.getElementById('q-lvl');
  lvlEl.style.visibility = 'hidden'; lvlEl.className = 'q-lvl';
  const qTextEl = document.createElement('div');
  qTextEl.className = "q-text start-mode";
  qTextEl.id = "q-text";
  qTextEl.textContent = LANG[currentLang].startText;
  btn.innerHTML = ''; btn.appendChild(qTextEl);
  showFeedback(LANG[currentLang].hintReset);
  drawRing(1, '#22c55e');
  updateStats();
});

function applyLang() {
  const L = LANG[currentLang];
  document.getElementById('btn-start').textContent = L.startBtn;
  document.getElementById('btn-next').textContent = L.skipBtn;
  document.getElementById('btn-reset').textContent = L.resetBtn;
  document.querySelectorAll('[data-my]').forEach(el => {
    if (!el.id) el.textContent = el.getAttribute('data-' + currentLang) || el.getAttribute('data-my');
  });
  if (gs && gs.phase === 'idle') {
    const qt = document.getElementById('q-text');
    if (qt && qt.className.includes('start-mode')) qt.textContent = L.startText;
    showFeedback(L.hintStart);
  }
}

let ringAnim = { current: 1, target: 1, color: '#22c55e', targetColor: '#22c55e', raf: null, lastTime: null };

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
  const ar=(ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
  const br=(bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
  const r=Math.round(ar+(br-ar)*t), g=Math.round(ag+(bg-ag)*t), bv=Math.round(ab+(bb-ab)*t);
  return '#'+((1<<24)|(r<<16)|(g<<8)|bv).toString(16).slice(1);
}

function drawRingAt(progress, color) {
  const canvas = document.getElementById('ring');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const SEGS = 32;
  const cx = W/2, cy = H/2;
  const outerR = W/2 - 6;
  const innerR = outerR - 42;
  const segRad = (2 * Math.PI) / SEGS;
  const GAP_RAD = 0.025;

  const isRed = color !== '#22c55e' && color !== '#16a34a';
  const dimFill   = isRed ? '#2a1111' : '#162216';
  const litStroke = isRed ? '#c53030' : '#15803d';
  const dimStroke = isRed ? '#3a1818' : '#1a3a1a';
  const litCount = Math.round(progress * SEGS);

  for (let i = 0; i < SEGS; i++) {
    const baseA = (i / SEGS) * 2 * Math.PI - Math.PI / 2;
    const startA = baseA + GAP_RAD;
    const endA   = baseA + segRad - GAP_RAD;

    ctx.beginPath();
    ctx.arc(cx, cy, outerR, startA, endA);
    ctx.arc(cx, cy, innerR, endA, startA, true);
    ctx.closePath();

    const lit = i < litCount;
    ctx.fillStyle   = lit ? color : dimFill;
    ctx.strokeStyle = lit ? litStroke : dimStroke;
    ctx.lineWidth   = 0.5;
    ctx.fill();
    ctx.stroke();
  }
}

function drawRing(progress, color='#22c55e') {
  ringAnim.target = progress;
  ringAnim.targetColor = color;
  if (!ringAnim.raf) {
    ringAnim.lastTime = null;
    ringAnim.raf = requestAnimationFrame(ringStep);
  }
}

function ringStep(ts) {
  if (!ringAnim.lastTime) ringAnim.lastTime = ts;
  const dt = Math.min((ts - ringAnim.lastTime) / 1000, 0.05);
  ringAnim.lastTime = ts;

  const spd = 12;
  const diff = ringAnim.target - ringAnim.current;
  const colorDiff = ringAnim.color !== ringAnim.targetColor;

  if (Math.abs(diff) > 0.001) {
    ringAnim.current += diff * Math.min(1, spd * dt);
  } else {
    ringAnim.current = ringAnim.target;
  }

  if (colorDiff) {
    ringAnim.color = lerpColor(ringAnim.color, ringAnim.targetColor, Math.min(1, spd * dt));
    if (ringAnim.color.toLowerCase() === ringAnim.targetColor.toLowerCase()) {
      ringAnim.color = ringAnim.targetColor;
    }
  }

  drawRingAt(ringAnim.current, ringAnim.color);

  const done = Math.abs(ringAnim.current - ringAnim.target) < 0.001 && !colorDiff;
  if (done) { ringAnim.raf = null; }
  else { ringAnim.raf = requestAnimationFrame(ringStep); }
}

const scoreAnims = {};

function animateValue(elId, toVal, isText=false) {
  if (isText) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.textContent = toVal;
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    setTimeout(()=>el.classList.remove('pop'), 220);
    return;
  }
  const el = document.getElementById(elId);
  if (!el) return;
  const from = parseInt(el.textContent.replace(/[^0-9]/g,''))||0;
  const to = parseInt(toVal)||0;
  if (from === to) return;
  if (scoreAnims[elId]) cancelAnimationFrame(scoreAnims[elId]);
  const dur = Math.min(400, Math.abs(to-from)*20+80);
  const start = performance.now();
  function step(ts) {
    const p = Math.min(1,(ts-start)/dur);
    const ease = 1-Math.pow(1-p,3);
    const cur = Math.round(from + (to-from)*ease);
    el.textContent = cur;
    if (p < 1) { scoreAnims[elId] = requestAnimationFrame(step); }
    else {
      el.textContent = to;
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
      setTimeout(()=>el.classList.remove('pop'),220);
    }
  }
  scoreAnims[elId] = requestAnimationFrame(step);
}

function updateStats() {
  animateValue('sv-score', gs.score);
  animateValue('sv-combo', gs.combo);
  animateValue('sv-max-combo', gs.maxCombo);
  let acc = gs.totalAttempts > 0 ? Math.round((gs.correctAttempts / gs.totalAttempts) * 100) : 100;
  const accEl = document.getElementById('sv-accuracy');
  if (accEl) accEl.textContent = acc + '%';
  
  const livesEl = document.getElementById('sv-lives');
  const newLives = "❤️".repeat(Math.max(0, gs.lives));
  if (livesEl && livesEl.textContent !== newLives) {
    livesEl.textContent = newLives;
    livesEl.classList.remove('pop');
    void livesEl.offsetWidth;
    livesEl.classList.add('pop');
    setTimeout(()=>livesEl.classList.remove('pop'),220);
  }
  
  const roundEl = document.getElementById('sv-round');
  if (roundEl) {
    const cur = parseInt(roundEl.textContent)||0;
    if (cur !== gs.round) {
      roundEl.textContent = gs.round;
      roundEl.classList.remove('pop');
      void roundEl.offsetWidth;
      roundEl.classList.add('pop');
      setTimeout(()=>roundEl.classList.remove('pop'),220);
    }
  }
  document.getElementById('sv-time').textContent = Math.max(0, Math.ceil(gs.timeLeft));
}

function showFeedback(text, type = 'neutral') {
  const hintEl = document.getElementById('hint-txt');
  if (hintEl._hideTimer) clearTimeout(hintEl._hideTimer);
  hintEl.classList.add('fade-out');
  setTimeout(() => {
    hintEl.className = 'hint-text ' + type;
    hintEl.textContent = text;
    void hintEl.offsetWidth;
    if (text) {
      hintEl._hideTimer = setTimeout(() => {
        hintEl.classList.add('fade-out');
      }, 2000);
    }
  }, 180);
}

      displayTxt += `<div style='margin-top:10px;font-size:28px;font-weight:800;color:${colorHex[colorIdx]};'>${colorNames[wordIdx]}</div>`;

    else if (gs.currentQ.special === 'time5s') {
      gs._time5Ready = false;
    }
    else if (gs.currentQ.special === 'math_sum5') {
      const a = Math.floor(Math.random()*5)+1;
      const b = Math.floor(Math.random()*5)+1;
      gs._sumGt5 = (a+b) > 5;
      displayTxt += `<div style='margin-top:8px;font-size:22px;font-weight:800;color:#eab308;'>${a} + ${b}</div>`;
    }
    else if (gs.currentQ.special === 'cats_gt3') {
      const count = Math.floor(Math.random()*6)+1;
      gs._catCountGt3 = (count > 3);
      displayTxt += "<div class='large-emoji' style='font-size:32px;letter-spacing:4px;'>" + "🐱".repeat(count) + "</div>";
    }
    else if (gs.currentQ.special === 'night_only') {
      // server checks hour from payload
    }
    else if (gs.currentQ.special === 'last2_wrong') {
      // server uses gs.last2Wrong from payload
    }
    else if (gs.currentQ.special === 'close_eyes_3s') {
      btn.style.opacity = '0.06';
      gs._eyesReadyAt = null;
      gs.delayTimeout = setTimeout(() => {
        if (gs.phase === 'playing') {
          btn.style.opacity = '1';
          gs._eyesReadyAt = performance.now();
          setTimeout(() => { gs._eyesReadyAt = null; }, 600); // 600ms reaction window
        }
      }, 3000);
    }
    else if (gs.currentQ.special === 'must_skip') {
      // resolved via skip button
    }
    else if (gs.currentQ.special === 'press3_not3rd') {
      gs._press3Count = 0;
    }
    else if (gs.currentQ.special === 'recall_q1') {
      const colorMap = currentLang==='en' ? {green:'🟢',red:'🔴',blue:'🔵',yellow:'🟡'} : {green:'🟢',red:'🔴',blue:'🔵',yellow:'🟡'};
      const opts = ['🟢','🔴','🔵','🟡'].sort(() => Math.random()-0.5);
      gs._recallTarget = gs.q1Color || '🟢';
      displayTxt += "<div style='display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:32px;'>" +
        opts.map(e => `<span data-rc='${e}' style='cursor:pointer;'>${e}</span>`).join('') + "</div>";
    }
    else if (gs.currentQ.special === 'inverse_label') {
      const isFalse = Math.random() > 0.5;
      const labelTxt = isFalse ? 'False' : 'True';
      const labelColor = isFalse ? '#ef4444' : '#22c55e';
      gs.eventReady = isFalse; // pressing is correct only when label says "False"
      displayTxt += `<div style='margin-top:10px;font-size:26px;font-weight:800;color:${labelColor};'>${labelTxt}</div>`;
    }
    else if (gs.currentQ.special === 'sum4') {
      const nums = [];
      while(nums.length < 4) {
        const candidate = Math.floor(Math.random()*4)+1;
        nums.push(candidate);
      }
      // ensure a subset sums to 4 (guarantee at least one combo)
      gs._sum4Nums = nums;
      gs._sum4Picked = [];
      displayTxt += "<div style='display:flex;gap:10px;justify-content:center;margin-top:10px;'>" +
        nums.map((n,i) => `<span data-n='${n}' data-i='${i}' style='cursor:pointer;background:#1f2f1f;border:1px solid #22c55e44;border-radius:8px;padding:6px 14px;font-weight:800;color:#22c55e;'>${n}</span>`).join('') + "</div>";
    }
    qTextEl.innerHTML = displayTxt;

  // smallest_obj: attach click handlers to each emoji span
  if (gs.currentQ.special === 'smallest_obj') {
    qTextEl.querySelectorAll('[data-emoji]').forEach(span => {
      span.addEventListener('click', (e) => {
        e.stopPropagation();
        if (gs.phase !== 'playing') return;
        const clicked = span.getAttribute('data-emoji');
        gs._smallestCorrect = (clicked === gs._smallestEmoji);
        resolve(true, 'press');
      });
    });
  }

  // green_only: click handlers for color emoji choices
  if (gs.currentQ.special === 'green_only') {
    qTextEl.querySelectorAll('[data-c]').forEach(span => {
      span.addEventListener('click', (e) => {
        e.stopPropagation();
        if (gs.phase !== 'playing') return;
        const clicked = span.getAttribute('data-c');
        if (gs.round === 1 || qIdx === 0) gs.q1Color = clicked;
        gs._greenChoiceCorrect = (clicked === '🟢');
        resolve(true, 'press');
      });
    });
  }

  // recall_q1: click handlers for color choices
  if (gs.currentQ.special === 'recall_q1') {
    qTextEl.querySelectorAll('[data-rc]').forEach(span => {
      span.addEventListener('click', (e) => {
        e.stopPropagation();
        if (gs.phase !== 'playing') return;
        const clicked = span.getAttribute('data-rc');
        gs._recallCorrect = (clicked === gs._recallTarget);
        resolve(true, 'press');
      });
    });
  }

  // sum4: click handlers for number tiles, finalize when selection sums to 4
  if (gs.currentQ.special === 'sum4') {
    qTextEl.querySelectorAll('[data-n]').forEach(span => {
      span.addEventListener('click', (e) => {
        e.stopPropagation();
        if (gs.phase !== 'playing') return;
        const i = span.getAttribute('data-i');
        const n = parseInt(span.getAttribute('data-n'));
        if (gs._sum4Picked.includes(i)) return;
        gs._sum4Picked.push(i);
        span.style.background = '#22c55e';
        span.style.color = '#0a1a0a';
        const sum = gs._sum4Picked.reduce((acc,idx) => acc + gs._sum4Nums[parseInt(idx)], 0);
        if (sum === 4) {
          gs._sum4Correct = true;
          resolve(true, 'press');
        } else if (sum > 4) {
          gs._sum4Correct = false;
          resolve(true, 'press');
        }
      });
    });
  }

  }

  if (!gs.currentQ.special || gs.currentQ.special !== 'corner_press') {
    ['tl','tr','bl','br'].forEach(c => {
      const el = document.getElementById('cdot-'+c);
      if (el) { el.style.display='none'; el.classList.remove('hit'); }
    });
  }
  
  updateStats();
  drawRing(1, '#22c55e');

  gs.interval = setInterval(() => {
    if (gs.phase !== 'playing') return;
    let oldSec = Math.ceil(gs.timeLeft);
    gs.timeLeft -= 0.05;
    drawRing(gs.timeLeft / TIMER_MAX, '#22c55e');
    
    let newSec = Math.ceil(gs.timeLeft);
    if (oldSec !== newSec) {
      const timeEl = document.getElementById('sv-time');
      if (timeEl) timeEl.textContent = Math.max(0, newSec);
    }
    
    if (gs.timeLeft <= 0) {
      clearInterval(gs.interval);
      resolve(false, 'timeout');
    }
  }, 50);
}

async function resolveMustSkip() {
  if (gs.phase !== 'playing') return;
  const qTextEl = document.getElementById('q-text');
  clearInterval(gs.interval);
  if (gs.delayTimeout) clearTimeout(gs.delayTimeout);
  gs.phase = 'result';
  gs.lastPressed = false;

  let correct = false;
  try {
    const qIdx = (gs.round - 1) % QUESTIONS.length;
    const resp = await fetch('/api/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ qId: 'q' + qIdx, pressed: false, didSkip: true })
    });
    const data = await resp.json();
    correct = data.correct === true;
  } catch (e) { correct = false; }

  gs.lastAns = correct;
  gs.last2Wrong = (!correct && gs.prevWrong === true);
  gs.prevWrong = !correct;

  const btn = document.getElementById('main-btn');
  const container = document.getElementById('ring-container');
  qTextEl.className = 'q-text status-mode';
  gs.totalAttempts++;

  if (correct) {
    gs.correctAttempts++;
    gs.combo++;
    if (gs.combo > gs.maxCombo) gs.maxCombo = gs.combo;
    gs.score += (10 + (gs.combo * 2));
    qTextEl.textContent = '✓';
    btn.style.background = '#14532d';
    btn.classList.add('answer-correct');
    drawRing(gs.timeLeft / TIMER_MAX, '#22c55e');
    const msgs = LANG[currentLang].correctMsgs;
    showFeedback(msgs[Math.min(gs.combo - 1, msgs.length - 1)], 'positive');
  } else {
    gs.combo = 0;
    gs.lives--;
    qTextEl.textContent = '❌';
    btn.style.background = '#450a0a';
    btn.classList.add('answer-wrong');
    drawRing(gs.timeLeft / TIMER_MAX, '#ef4444');
    container.style.animation = 'shake 0.1s 5';
    setTimeout(() => { container.style.animation = ''; }, 500);
    if (gs.lives > 0) {
      const msgs = LANG[currentLang].wrongMsgs;
      showFeedback(msgs[Math.floor(Math.random() * msgs.length)], 'negative');
    } else {
      showFeedback(LANG[currentLang].wrongOver, 'negative');
    }
  }

  setTimeout(() => {
    btn.style.background = '';
    btn.classList.remove('answer-correct','answer-wrong');
    const flash = document.getElementById('round-flash');
    if (flash) {
      flash.style.background = correct ? 'rgba(34,197,94,0.07)' : 'rgba(239,68,68,0.07)';
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 150);
    }
    gs.round = getNextRound();
    startRound();
  }, 1400);
}

async function resolve(pressed, src, event = null) {
  if (gs.phase !== 'playing') return;
  const qTextEl = document.getElementById('q-text');

  // Corner press: track hits client-side (UI only), don't finalize until 4 corners
  if (gs.currentQ.special === 'corner_press' && src === 'outside' && event) {
    const x = event.clientX; const y = event.clientY;
    const w = window.innerWidth; const h = window.innerHeight;
    let hit = null;
    if (x < w * 0.3 && y < h * 0.3) hit = 'tl';
    else if (x > w * 0.7 && y < h * 0.3) hit = 'tr';
    else if (x < w * 0.3 && y > h * 0.7) hit = 'bl';
    else if (x > w * 0.7 && y > h * 0.7) hit = 'br';
    if (hit && !gs.corners[hit]) {
      gs.corners[hit] = true;
      gs.cornerCount++;
      const dotEl = document.getElementById('cdot-'+hit);
      if (dotEl) dotEl.classList.add('hit');
      qTextEl.innerHTML = LANG[currentLang].cornerText(gs.cornerCount);
      if (gs.cornerCount < 4) return;
    } else { return; }
  }

  // Tap3: count client-side, don't finalize until 3 taps
  if (gs.currentQ.special === 'tap3' && src === 'press') {
    gs.tapCount++;
    if (gs.tapCount < 3) return;
  }

  // press3_not3rd: count presses; correct = 3 presses where 3rd press never happens (timeout on 3rd)
  if (gs.currentQ.special === 'press3_not3rd') {
    if (src === 'press') {
      gs._press3Count++;
      if (gs._press3Count === 3) {
        // pressing on 3rd time is WRONG
        gs._tap3NotThird = false;
      } else if (gs._press3Count < 3) {
        return; // need more presses
      }
    } else if (src === 'timeout') {
      // timed out without a 3rd press = correct if exactly 2 presses happened
      gs._tap3NotThird = (gs._press3Count === 2);
    }
  }

  // reflex1s: must press after button becomes visible, within 1s
  if (gs.currentQ.special === 'reflex1s' && src === 'press') {
    gs._reflexHit = !!(gs._reflexReadyAt && (performance.now() - gs._reflexReadyAt) <= 1000);
  }

  // close_eyes_3s: must press within reaction window after 3s delay
  if (gs.currentQ.special === 'close_eyes_3s' && src === 'press') {
    gs._eyesReflexHit = !!gs._eyesReadyAt;
  }

  // shrink: must press after shrink happened
  if (gs.currentQ.special === 'shrink' && src === 'press') {
    gs._shrinkHit = gs._shrinkReady === true;
  }

  // time5s: press near the 5-second mark (within 0.4s tolerance)
  if (gs.currentQ.special === 'time5s' && src === 'press') {
    const elapsed = TIMER_MAX - gs.timeLeft;
    gs._time5sHit = Math.abs(elapsed - 5) <= 0.4;
  }

  clearInterval(gs.interval);
  if (gs.delayTimeout) clearTimeout(gs.delayTimeout);

  gs.phase = 'result';
  gs.lastPressed = (src === 'press');

  // ── Server-side answer check ──────────────────────────────────────────────
  let correct = false;
  try {
    const qIdx = (gs.round - 1) % QUESTIONS.length;
    const payload = {
      qId: 'q' + qIdx,
      pressed: src === 'press',
      eventReady: gs.eventReady,
      tapCount: gs.tapCount,
      cornerCount: gs.cornerCount,
      smallestCorrect: gs._smallestCorrect || false,
      lastAns: gs.lastAns,
      lastPressed: gs.lastPressed,
      timeElapsed: TIMER_MAX - gs.timeLeft,
      hour: new Date().getHours(),
      // Round 2 fields
      greenPressed: gs._greenChoiceCorrect || false,
      qNumEven: gs.eventReady,
      reflexHit: gs._reflexHit || false,
      hasNegation: gs._hasNegation || false,
      flashCount: gs._flashCount || 0,
      posCorrect: gs._posTLCorrect || false,
      shrinkHit: gs._shrinkHit || false,
      prevWrong: gs.prevWrong,
      wordCountOk: gs._wordCountOk || false,
      repeatCornerCorrect: (gs.currentQ.special === 'repeat_corner') ? (gs.lastCorner && gs.corners[gs.lastCorner]) || false : false,
      stroopCorrect: gs._stroopCorrect || false,
      time5sHit: gs._time5sHit || false,
      sumGt5: gs._sumGt5 || false,
      catCountGt3: gs._catCountGt3 || false,
      isNight: !(new Date().getHours() >= 6 && new Date().getHours() < 18),
      last2Wrong: gs.last2Wrong,
      eyesReflexHit: gs._eyesReflexHit || false,
      didSkip: false,
      tap3NotThird: gs._tap3NotThird || false,
      recallCorrect: gs._recallCorrect || false,
      sum4Correct: gs._sum4Correct || false
    };
    const resp = await fetch('/api/check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) {
      console.error('check API error status:', resp.status, await resp.text());
    }
    const data = await resp.json();
    correct = data.correct === true;
  } catch (e) {
    console.error('check API fetch failed:', e);
    // Network error: fail safe (mark wrong, don't crash game)
    correct = false;
  }
  // ─────────────────────────────────────────────────────────────────────────

  // Update lastAns for same_last / not_last questions
  gs.lastAns = correct;

  // Round 2 state tracking
  gs.last2Wrong = (!correct && gs.prevWrong === true);
  gs.prevWrong = !correct;
  if (gs.currentQ.special === 'corner_press' || gs.currentQ.special === 'repeat_corner') {
    const hitCorner = Object.keys(gs.corners).find(c => gs.corners[c]);
    if (hitCorner) gs.lastCorner = hitCorner;
  }
  if (gs.currentQ.special === 'green_only' && gs._greenChoiceCorrect) gs.q1Color = '🟢';

  ['tl','tr','bl','br'].forEach(c => {
    const el = document.getElementById('cdot-'+c);
    if (el) { el.style.display='none'; el.classList.remove('hit'); }
  });

  const btn = document.getElementById('main-btn');
  const container = document.getElementById('ring-container');
  qTextEl.className = 'q-text status-mode';

  gs.totalAttempts++;

  if (correct) {
    gs.correctAttempts++;
    gs.combo++;
    if (gs.combo > gs.maxCombo) gs.maxCombo = gs.combo;
    gs.score += (10 + (gs.combo * 2));

    qTextEl.textContent = '✓';
    btn.style.background = '#14532d';
    btn.classList.add('answer-correct');
    drawRing(gs.timeLeft / TIMER_MAX, '#22c55e');

    const msgs = LANG[currentLang].correctMsgs;
    const idx = Math.min(gs.combo - 1, msgs.length - 1);
    showFeedback(msgs[idx], 'positive');

    if (gs.currentQ.special === 'jumpscare' && src === 'press') {
      document.getElementById('main-wrap').classList.add('jumpscare-flash');
      container.style.transform = 'scale(2.3)';
      setTimeout(() => {
        document.getElementById('main-wrap').classList.remove('jumpscare-flash');
        container.style.transform = 'scale(1)';
      }, 300);
    }
  } else {
    gs.combo = 0;
    gs.lives--;

    qTextEl.textContent = '❌';
    btn.style.background = '#450a0a';
    btn.classList.add('answer-wrong');
    drawRing(gs.timeLeft / TIMER_MAX, '#ef4444');
    container.style.animation = 'shake 0.1s 5';
    setTimeout(() => { container.style.animation = ''; }, 500);

    if (gs.lives > 0) {
      const msgs = src === 'timeout' ? LANG[currentLang].timeoutMsgs : LANG[currentLang].wrongMsgs;
      showFeedback(msgs[Math.floor(Math.random() * msgs.length)], 'negative');
    } else {
      showFeedback(LANG[currentLang].wrongOver, 'negative');
    }
  }

  setTimeout(() => {
    btn.style.background = '';
    btn.classList.remove('answer-correct','answer-wrong');
    const flash = document.getElementById('round-flash');
    if (flash) {
      flash.style.background = correct ? 'rgba(34,197,94,0.07)' : 'rgba(239,68,68,0.07)';
      flash.classList.add('active');
      setTimeout(() => flash.classList.remove('active'), 150);
    }
    gs.round = getNextRound();
    startRound();
  }, 1400);
}

function endGame() {
  if (gs.interval) clearInterval(gs.interval);
  if (gs.delayTimeout) clearTimeout(gs.delayTimeout);
  
  gs.phase = 'gameover';
  const btn = document.getElementById('main-btn');
  btn.className = "center-btn gameover-mode";
  
  let acc = gs.totalAttempts > 0 ? Math.round((gs.correctAttempts / gs.totalAttempts) * 100) : 100;
  const rank = getRank(gs.score);
  
  btn.innerHTML = `
    <div class="q-text gameover-title">${LANG[currentLang].gameoverTitle}</div>
    <div class="q-text gameover-desc">
      ${LANG[currentLang].gameoverScore}: <b>${gs.score}</b><br>
      ${LANG[currentLang].gameoverMaxCombo}: <b>${gs.maxCombo}</b><br>
      ${LANG[currentLang].gameoverAcc}: <b>${acc}%</b>
    </div>
  `;
  
  // Show share button
  const shareBtn = document.getElementById('btn-share');
  shareBtn.style.display = 'block';
  document.getElementById('share-btn-txt').textContent = currentLang === 'my' ? 'Score Share လုပ်ပါ' : 'Share Score';

  document.getElementById('q-lvl').style.visibility = 'hidden';
  showFeedback(LANG[currentLang].gameoverThanks, 'positive');
  updateStats();
}

document.getElementById('main-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  if (gs.phase === 'idle') { startRound(); return; }
  if (gs.phase === 'playing') resolve(true, 'press');
});

document.getElementById('main-wrap').addEventListener('click', (e) => {
  if (gs.phase !== 'playing') return;
  if (e.target.closest('.btn-row') || e.target.closest('.q-lvl')) return;
  
  if (gs.currentQ && (gs.currentQ.special === 'click_anywhere_but' || gs.currentQ.special === 'corner_press')) {
    resolve(false, 'outside', e);
  }
});

document.getElementById('btn-start').addEventListener('click', () => {
  if(gs.phase === 'gameover' || gs.phase === 'idle') {
    gs.round = 1; gs.score = 0; gs.combo = 0; gs.maxCombo = 0; gs.lives = 3;
    gs.correctAttempts = 0; gs.totalAttempts = 0;
    const btn = document.getElementById('main-btn');
    btn.className = "center-btn";
    btn.innerHTML = `<div class="q-text" id="q-text">${LANG[currentLang].startingText}</div>`;
    startRound();
  }
});

document.getElementById('btn-next').addEventListener('click', () => {
  if (gs.phase === 'playing') {
    if (gs.currentQ && gs.currentQ.special === 'must_skip') {
      gs._didSkip = true;
      resolveMustSkip();
      return;
    }
    clearInterval(gs.interval);
    if (gs.delayTimeout) clearTimeout(gs.delayTimeout);
    gs.totalAttempts++;
    gs.lastPressed = false;
    gs.lastAns = false; // skip = treat as wrong for same_last logic
    gs.combo = 0;
    gs.prevWrong = true;
    gs.round = getNextRound();
    startRound();
  }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (gs.interval) clearInterval(gs.interval);
  if (gs.delayTimeout) clearTimeout(gs.delayTimeout); 
  
  gs.score = 0; gs.combo = 0; gs.maxCombo = 0; gs.lives = 3;
  gs.correctAttempts = 0; gs.totalAttempts = 0;
  gs.round = 1; gs.phase = 'idle';
  
  document.getElementById('main-wrap').style.background = '#0a0a0a';
  const btn = document.getElementById('main-btn');
  btn.className = "center-btn";
  btn.style.opacity = '1';
  
  const lvlEl = document.getElementById('q-lvl');
  lvlEl.style.visibility = 'hidden'; lvlEl.className = 'q-lvl';
  
  const qTextEl = document.createElement('div');
  qTextEl.className = "q-text start-mode";
  qTextEl.id = "q-text";
  qTextEl.textContent = LANG[currentLang].startText;
  btn.innerHTML = '';
  btn.appendChild(qTextEl);
  
  showFeedback(LANG[currentLang].hintReset);
  document.getElementById('btn-share').style.display = 'none';
  drawRing(1, '#22c55e'); 
  updateStats();
});

function getRank(score) {
  if (score >= 400) return '🏆 Legend';
  if (score >= 280) return '🥇 Gold';
  if (score >= 180) return '🥈 Silver';
  if (score >= 100) return '🥉 Bronze';
  return '🎮 Beginner';
}

function getShareText() {
  const acc = gs.totalAttempts > 0 ? Math.round((gs.correctAttempts / gs.totalAttempts) * 100) : 100;
  const rank = getRank(gs.score);
  const isMy = currentLang === 'my';
  if (isMy) {
    return `🧠 Brain Press Quiz\n${rank}\nရမှတ်: ${gs.score} | Combo: x${gs.maxCombo} | မှန်ကန်မှု: ${acc}%\n\nမင်းလည်း ကြိုးစားကြည့်ပါ 👇\nhttps://your-game.vercel.app`;
  } else {
    return `🧠 Brain Press Quiz\n${rank}\nScore: ${gs.score} | Combo: x${gs.maxCombo} | Accuracy: ${acc}%\n\nCan you beat me? 👇\nhttps://your-game.vercel.app`;
  }
}

function shareScore() {
  const text = getShareText();
  const acc = gs.totalAttempts > 0 ? Math.round((gs.correctAttempts / gs.totalAttempts) * 100) : 100;
  const rank = getRank(gs.score);
  const isMy = currentLang === 'my';

  document.getElementById('share-modal-title').textContent = isMy ? 'Score Share လုပ်ပါ' : 'Share Your Score';
  document.getElementById('share-native-txt').textContent = isMy ? 'Apps မှတဆင့် Share' : 'Share via Apps';
  document.getElementById('share-preview').innerHTML = `
    <div style="font-size:20px;margin-bottom:4px;">${rank}</div>
    <div style="color:#22c55e;font-size:18px;font-weight:800;">${gs.score} pts</div>
    <div style="color:#64748b;font-size:11px;margin-top:4px;">Combo x${gs.maxCombo} · ${acc}% ${isMy?'မှန်':'acc'}</div>
  `;
  document.getElementById('share-copied-msg').textContent = '';
  document.getElementById('share-modal-overlay').classList.add('open');
}

function closeShare() {
  document.getElementById('share-modal-overlay').classList.remove('open');
}

async function doShare(platform) {
  const text = getShareText();
  const url = 'https://your-game.vercel.app';
  const isMy = currentLang === 'my';
  const copiedMsg = document.getElementById('share-copied-msg');

  if (platform === 'native') {
    if (navigator.share) {
      try {
        await navigator.share({ title: '🧠 Brain Press Quiz', text: text, url: url });
        return;
      } catch(e) {}
    }
    // fallback to copy
    platform = 'copy';
  }

  if (platform === 'telegram') {
    const encoded = encodeURIComponent(text);
    window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encoded}`, '_blank');
    return;
  }

  if (platform === 'facebook') {
    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}&quote=${encodeURIComponent(text)}`, '_blank');
    return;
  }

  if (platform === 'instagram') {
    // Instagram မှာ direct share API မရှိဘူး — copy လုပ်ပေးမယ်
    try {
      await navigator.clipboard.writeText(text);
      copiedMsg.textContent = isMy ? '📋 Copied! Instagram story မှာ paste လုပ်ပါ' : '📋 Copied! Paste in Instagram story';
    } catch(e) {
      copiedMsg.textContent = isMy ? 'Copy မရဘဲ ဖြစ်သွားတယ်' : 'Could not copy';
    }
    return;
  }

  if (platform === 'copy') {
    try {
      await navigator.clipboard.writeText(text);
      copiedMsg.textContent = isMy ? '✅ Copied!' : '✅ Copied to clipboard!';
      setTimeout(() => { copiedMsg.textContent = ''; }, 2000);
    } catch(e) {
      copiedMsg.textContent = isMy ? 'Copy မရဘဲ ဖြစ်သွားတယ်' : 'Could not copy';
    }
  }
}

function resizeCanvas() {
  const isMobile = window.innerWidth <= 420;
  const size = isMobile ? 310 : 380;
  const canvas = document.getElementById('ring');
  const container = document.getElementById('ring-container');
  canvas.width = size; canvas.height = size;
  canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
  container.style.width = size + 'px'; container.style.height = size + 'px';
  const btn = document.getElementById('main-btn');
  const btnSize = isMobile ? 222 : 272;
  btn.style.width = btnSize + 'px'; btn.style.height = btnSize + 'px';
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawRing(1, '#22c55e'); });
drawRing(1, '#22c55e');
</script>
